<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中国汽油价格管理</title>
    <link rel="stylesheet" href="/style.css?v=20260226apple" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <nav class="main-nav">
      <div class="nav-container">
   
        <div class="nav-links">
          <a href="/" class="nav-link active">首页</a>
          <a href="/map.html" class="nav-link">油价地图</a>
          <a href="/chart.html" class="nav-link">油价图表</a>
        </div>
      </div>
    </nav>

    <main class="layout">
      <section id="local-prices-section" class="card reveal delay-1" style="display: none;">
        <div class="local-prices-header">
          <h2 id="local-province-name">当前位置油价</h2>
          <div style="display: flex; align-items: center; gap: 8px;">
            <span id="local-update-time" class="update-time">加载中...</span>
            <button id="refresh-location-btn" class="btn" style="min-height: 32px; padding: 0 12px; font-size: 13px;" title="重新定位">
              🔄
            </button>
          </div>
        </div>
        <div id="local-prices-grid" class="local-prices-grid">
          <!-- 油价按钮将通过JavaScript动态生成 -->
        </div>
      </section>

      <section class="card reveal delay-2">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
          <h2 style="margin: 0;">历史查询</h2>
          <button id="crawl-btn" type="button" class="btn primary">爬取最新油价</button>
        </div>
        <form id="search-form" class="grid-form">
          <label>
            省份（可选）
            <select id="province" name="province"></select>
          </label>
          <label>
            油品（可选）
            <select id="fuelType" name="fuelType">
              <option value="">全部</option>
              <option value="GASOLINE_92">92号</option>
              <option value="GASOLINE_95">95号</option>
              <option value="GASOLINE_98">98号</option>
              <option value="DIESEL_0">0号</option>
            </select>
          </label>
          <label>
            开始日期
            <input id="startDate" name="startDate" type="text" class="date-input" placeholder="YYYY-MM-DD" readonly />
          </label>
          <label>
            结束日期
            <input id="endDate" name="endDate" type="text" class="date-input" placeholder="YYYY-MM-DD" readonly />
          </label>
          <button type="submit" class="btn primary">查询历史</button>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>省份</th>
                <th>油品</th>
                <th>调整日期</th>
                <th data-sort="pricePerLiter">单价(元/L)<span class="sort-icon"> ↕</span></th>
                <th data-sort="priceChange">价格变动<span class="sort-icon"> ↕</span></th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="result-body"></tbody>
          </table>
        </div>

        <div class="pager">
          <button id="prev-page" class="btn" type="button">上一页</button>
          <span id="page-info">第 1 / 1 页 · 共 0 条</span>
          <button id="next-page" class="btn" type="button">下一页</button>
        </div>
      </section>

      <p id="toast" class="toast"></p>
    </main>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
