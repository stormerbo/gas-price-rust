<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tauri 环境测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f7;
        }
        .test-section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            color: #1d1d1f;
        }
        button {
            background: #0071e3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0077ed;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f7;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success { color: #34c759; }
        .error { color: #ff3b30; }
    </style>
</head>
<body>
    <h1>🧪 Tauri 环境测试</h1>

    <div class="test-section">
        <h2>1. 环境检测</h2>
        <button onclick="testEnvironment()">检测环境</button>
        <div id="env-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. 本地 API 测试</h2>
        <button onclick="testLocalAPI()">测试本地 API</button>
        <div id="api-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. 外部 API 测试（IP 定位）</h2>
        <button onclick="testExternalAPI()">测试 IP 定位</button>
        <div id="external-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>4. Tauri HTTP API 测试</h2>
        <button onclick="testTauriHTTP()">测试 Tauri HTTP</button>
        <div id="tauri-http-result" class="result"></div>
    </div>

    <script type="module">
        import { universalFetch, getEnvironmentInfo } from './js/tauriFetch.js';
        import { API_BASE } from './js/constants.js';

        window.testEnvironment = function() {
            const info = getEnvironmentInfo();
            const result = document.getElementById('env-result');
            result.innerHTML = `
环境信息:
- Tauri 环境: ${info.isTauri ? '✅ 是' : '❌ 否'}
- User Agent: ${info.userAgent}
- Tauri API 可用: ${info.hasTauriAPI ? '✅ 是' : '❌ 否'}
- API_BASE: ${API_BASE}
            `.trim();
        };

        window.testLocalAPI = async function() {
            const result = document.getElementById('api-result');
            result.innerHTML = '⏳ 测试中...';
            
            try {
                const response = await fetch(`${API_BASE}/history?page=0&size=1`);
                const data = await response.json();
                
                result.innerHTML = `
<span class="success">✅ 成功</span>
状态码: ${response.status}
数据: ${JSON.stringify(data, null, 2)}
                `.trim();
            } catch (error) {
                result.innerHTML = `
<span class="error">❌ 失败</span>
错误: ${error.message}
                `.trim();
            }
        };

        window.testExternalAPI = async function() {
            const result = document.getElementById('external-result');
            result.innerHTML = '⏳ 测试中...';
            
            try {
                // 使用 ip-api.com 替代 ipapi.co
                const response = await universalFetch('http://ip-api.com/json/?lang=zh-CN&fields=status,regionName,city,country');
                const data = await response.json();
                
                result.innerHTML = `
<span class="success">✅ 成功</span>
状态码: ${response.status}
数据: ${JSON.stringify(data, null, 2)}
                `.trim();
            } catch (error) {
                result.innerHTML = `
<span class="error">❌ 失败</span>
错误: ${error.message}
Stack: ${error.stack}
                `.trim();
            }
        };

        window.testTauriHTTP = async function() {
            const result = document.getElementById('tauri-http-result');
            
            if (!window.__TAURI__) {
                result.innerHTML = '<span class="error">❌ 不在 Tauri 环境中</span>';
                return;
            }
            
            result.innerHTML = '⏳ 测试中...';
            
            try {
                const { fetch: tauriFetch } = window.__TAURI__.http;
                // 使用 ip-api.com 替代 ipapi.co
                const response = await tauriFetch('http://ip-api.com/json/?lang=zh-CN&fields=status,regionName,city,country', {
                    method: 'GET',
                    responseType: 1, // JSON
                });
                
                result.innerHTML = `
<span class="success">✅ 成功</span>
状态码: ${response.status}
OK: ${response.ok}
数据: ${JSON.stringify(response.data, null, 2)}
                `.trim();
            } catch (error) {
                result.innerHTML = `
<span class="error">❌ 失败</span>
错误: ${error.message || error}
详情: ${JSON.stringify(error, null, 2)}
                `.trim();
            }
        };

        // 自动运行环境检测
        window.addEventListener('DOMContentLoaded', () => {
            testEnvironment();
        });
    </script>
</body>
</html>
