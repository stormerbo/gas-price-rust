<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>油价直方图 - 中国汽油价格管理</title>
    <link rel="stylesheet" href="/style.css?v=20260226apple" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <nav class="main-nav">
      <div class="nav-container">
        <div class="nav-links">
          <a href="/" class="nav-link">首页</a>
          <a href="/map.html" class="nav-link">油价地图</a>
          <a href="/chart.html" class="nav-link active">油价图表</a>
        </div>
      </div>
    </nav>

    <main class="layout">
      <header class="hero card reveal">
        <h1>全国油价分析</h1>
        <p id="chart-subtitle">各省份最新油价对比分析</p>
      </header>

      <section id="local-prices-section" class="card reveal delay-1" style="display: none;">
        <div class="local-prices-header">
          <h2 id="local-province-name">当前位置油价</h2>
          <div style="display: flex; align-items: center; gap: 8px;">
            <span id="local-update-time" class="update-time">加载中...</span>
            <button id="refresh-location-btn" class="btn" style="min-height: 32px; padding: 0 12px; font-size: 13px;" title="重新定位">
              🔄
            </button>
          </div>
        </div>
        <div id="local-prices-grid" class="local-prices-grid">
          <!-- 油价卡片将通过JavaScript动态生成，可点击切换图表 -->
        </div>
      </section>

      <section class="card reveal delay-2">
        <h2>价格分布</h2>
        <div class="chart-container">
          <canvas id="priceChart"></canvas>
        </div>
      </section>

      <section class="card reveal delay-3">
        <h2>统计信息</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">最高价</div>
            <div class="stat-value" id="max-price">-</div>
            <div class="stat-detail" id="max-province">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">最低价</div>
            <div class="stat-value" id="min-price">-</div>
            <div class="stat-detail" id="min-province">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">平均价</div>
            <div class="stat-value" id="avg-price">-</div>
            <div class="stat-detail" id="price-range">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">省份数</div>
            <div class="stat-value" id="province-count">-</div>
            <div class="stat-detail">个省级行政区</div>
          </div>
        </div>
      </section>

      <p id="toast" class="toast"></p>
    </main>

    <script type="module" src="/chart-new.js?v=20260226component"></script>
  </body>
</html>
