<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1030"/>
      <stop offset="100%" stop-color="#0e1a42"/>
    </linearGradient>
    <linearGradient id="drop" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c8f0ff"/>
      <stop offset="35%" stop-color="#4db8ff"/>
      <stop offset="70%" stop-color="#1a7ae6"/>
      <stop offset="100%" stop-color="#0d4a9e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="45%">
      <stop offset="0%" stop-color="#3090d0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a1030" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="highlight" cx="42%" cy="32%" r="20%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#a0d8ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="roundedBg">
      <rect width="512" height="512" rx="110" ry="110"/>
    </clipPath>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g clip-path="url(#roundedBg)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#glow)"/>
    <g filter="url(#dropShadow)">
      <path d="M256 88 C256 88 252 96 244 112 C220 158 172 240 172 310 C172 360 210 404 256 404 C302 404 340 360 340 310 C340 240 292 158 268 112 C260 96 256 88 256 88 Z" fill="url(#drop)"/>
    </g>
    <ellipse cx="240" cy="260" rx="48" ry="65" fill="url(#highlight)"/>
    <circle cx="232" cy="230" r="14" fill="white" opacity="0.6"/>
  </g>
</svg>
